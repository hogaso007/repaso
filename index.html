<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Night Club</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
    }

    header{
      background:linear-gradient(90deg,#ff006e,#8338ec);
      padding:25px;
      text-align:center;
    }

    nav{
      background:#000;
      padding:15px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 20px;
      font-weight:bold;
    }

    nav a:hover{
      color:#ff006e;
    }

    .hero{
      height:500px;
      background:url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1600') center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:50px;
      font-weight:bold;
      text-shadow:2px 2px 10px black;
    }

    section{
      padding:50px;
    }
